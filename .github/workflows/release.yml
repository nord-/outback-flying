name: Release

on:
  pull_request:
    types: [closed]
    branches: [master]

permissions:
  contents: write

jobs:
  release:
    if: github.event.pull_request.merged == true
    runs-on: windows-latest
    env:
      HAS_MAJOR: ${{ contains(github.event.pull_request.labels.*.name, 'major') }}
      HAS_MINOR: ${{ contains(github.event.pull_request.labels.*.name, 'minor') }}
      HAS_PATCH: ${{ contains(github.event.pull_request.labels.*.name, 'patch') }}
    steps:
      - name: Determine version bump
        id: bump
        shell: bash
        run: |
          # Priority order when a PR carries more than one of these labels: major > minor > patch.
          if [ "$HAS_MAJOR" = "true" ]; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif [ "$HAS_MINOR" = "true" ]; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          elif [ "$HAS_PATCH" = "true" ]; then
            echo "type=patch" >> "$GITHUB_OUTPUT"
          else
            echo "type=none" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.bump.outputs.type != 'none'
        with:
          ref: master
          fetch-depth: 0

      - uses: actions/setup-node@v4
        if: steps.bump.outputs.type != 'none'
        with:
          node-version: 20
          cache: npm

      - name: Bump version, tag and push
        if: steps.bump.outputs.type != 'none'
        id: version
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version "${{ steps.bump.outputs.type }}" --no-git-tag-version
          version=$(node -p "require('./package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"
          git add package.json package-lock.json
          git commit -m "chore: bump version to v$version"
          git tag "v$version"
          git push origin master
          git push origin "v$version"

      - name: Install dependencies
        if: steps.bump.outputs.type != 'none'
        run: npm ci

      - name: Build Windows installer
        if: steps.bump.outputs.type != 'none'
        run: npm run electron:build

      - name: Create GitHub Release
        if: steps.bump.outputs.type != 'none'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          files: release/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
